<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Rêve · Admin</title>
<meta name="theme-color" content="#F5EFE6"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --cream:#F5EFE6;--cream2:#EDE5D8;--sand:#D4C4AD;--terracota:#B8705A;--terra-dk:#9A5A46;
  --ink:#1E1710;--ink2:#3D3228;--muted:#7A6E64;--muted2:#A89E94;--white:#FEFCF9;
  --green:#4A7C5E;--red:#B85252;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:16px;--r-sm:10px;
  --shadow:0 2px 20px rgba(30,23,16,.08),0 1px 4px rgba(30,23,16,.04);
  --shadow-lg:0 8px 40px rgba(30,23,16,.12),0 2px 8px rgba(30,23,16,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100dvh;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:100;background:rgba(245,239,230,.88);backdrop-filter:blur(18px) saturate(180%);border-bottom:1px solid var(--sand);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px}
.logo{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:.06em;color:var(--ink);flex-shrink:0}
.logo em{font-style:italic;color:var(--terracota)}
.topbar-mid{flex:1}
.env-dot{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.env-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:background .3s}
.env-dot.online::before{background:var(--green)}
.env-dot.offline::before{background:var(--red)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.who{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--sand);background:var(--white);color:var(--ink2);cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:hover{border-color:var(--ink2)}
.btn.primary{background:var(--ink);color:var(--white);border-color:var(--ink)}
.btn.primary:hover{background:var(--ink2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink)}
.btn.danger{color:var(--red);border-color:rgba(184,82,82,.25)}
.btn.danger:hover{background:rgba(184,82,82,.06)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default}
.input{width:100%;font-family:var(--sans);font-size:14px;padding:10px 13px;background:var(--white);border:1px solid var(--sand);border-radius:var(--r-sm);color:var(--ink);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--terracota)}
.input::placeholder{color:var(--muted2)}
textarea.input{min-height:200px;resize:vertical;font-family:monospace;font-size:12px;line-height:1.5}
.page{max-width:1280px;margin:0 auto;padding:20px 16px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--cream2);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:.02em;color:var(--ink)}
.card-body{padding:14px 18px 18px}
.sep{height:1px;background:var(--cream2);margin:14px 0}
.patient-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all .15s;position:relative}
.patient-item:hover{background:var(--cream);border-color:var(--cream2)}
.patient-item.active{background:rgba(184,112,90,.06);border-color:rgba(184,112,90,.3)}
.patient-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:2px;background:var(--terracota)}
.avatar{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--cream2),var(--sand));display:grid;place-items:center;font-family:var(--serif);font-size:16px;font-weight:600;color:var(--terracota);flex-shrink:0}
.p-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.p-sub{font-size:12px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.p-stats{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.stat-pill{font-size:11px;color:var(--muted);background:var(--cream);border:1px solid var(--cream2);border-radius:999px;padding:2px 7px}
.stat-pill.has{color:var(--green);background:rgba(74,124,94,.07);border-color:rgba(74,124,94,.2)}
.tabs-row{display:flex;gap:4px;padding:14px 18px 0;border-bottom:1px solid var(--cream2)}
.tab-btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 14px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:1px solid var(--cream2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;position:relative;bottom:-1px}
.tab-btn:hover{color:var(--ink2)}
.tab-btn.active{color:var(--terracota);background:var(--white);border-color:var(--cream2);border-bottom-color:var(--white)}
.panel{display:none;padding:18px}
.panel.active{display:block}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;border:1px solid var(--sand);background:var(--white);color:var(--muted)}
.badge.ok{color:var(--green);border-color:rgba(74,124,94,.3);background:rgba(74,124,94,.06)}
.badge.bad{color:var(--red);border-color:rgba(184,82,82,.3);background:rgba(184,82,82,.06)}
.badge.accent{color:var(--terracota);border-color:rgba(184,112,90,.3);background:rgba(184,112,90,.06)}
.diary-section h4{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted2);border-bottom:1px solid var(--cream2)}
td{padding:10px;border-bottom:1px solid var(--cream);vertical-align:top}
tr:last-child td{border-bottom:none}
.mono{font-family:monospace;font-size:12px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.photo-card{border:1px solid var(--cream2);border-radius:12px;overflow:hidden;background:var(--cream);transition:box-shadow .2s}
.photo-card:hover{box-shadow:var(--shadow-lg)}
.photo-card img{width:100%;height:130px;object-fit:cover;display:block}
.photo-card .ph-cap{padding:8px 10px;font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px}
.login-page{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(184,112,90,.12),transparent),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(212,196,173,.3),transparent),var(--cream)}
.login-logo{font-family:var(--serif);font-size:48px;font-weight:300;letter-spacing:.12em;color:var(--ink);margin-bottom:6px}
.login-logo em{font-style:italic;color:var(--terracota)}
.login-sub{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:40px}
.login-card{width:100%;max-width:380px}
.login-field{margin-bottom:12px}
.login-field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:16px}
.login-hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:16px}
.empty{text-align:center;padding:48px 24px;color:var(--muted2)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);font-size:13px;padding:10px 18px;border-radius:999px;box-shadow:var(--shadow-lg);display:none;align-items:center;gap:8px;white-space:nowrap;z-index:999;animation:fadeUp .2s ease}
.toast.show{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hide{display:none!important}
.row{display:flex;gap:10px}
.row>*{flex:1}
.col{display:flex;flex-direction:column;gap:10px}
.scroll-x{overflow-x:auto}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.summary-box{background:var(--cream);border:1px solid var(--cream2);border-radius:12px;padding:12px 14px;text-align:center}
.summary-num{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--terracota);line-height:1}
.summary-label{font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap .input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted2);pointer-events:none}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Rê<em>ve</em></div>
  <div class="topbar-mid"><span class="env-dot" id="envDot">offline</span></div>
  <div class="topbar-right">
    <span class="who" id="whoami"></span>
    <button class="btn sm" id="logoutBtn" style="display:none">Sair</button>
  </div>
</div>
<div class="login-page" id="loginPage">
  <div class="login-logo">Rê<em>ve</em></div>
  <div class="login-sub">Painel Administrativo</div>
  <div class="card login-card">
    <div class="card-body" style="padding:24px">
      <div class="login-field"><label>Email</label><input class="input" id="loginEmail" type="email" placeholder="seu@email.com" autocomplete="username"/></div>
      <div class="login-field"><label>Senha</label><input class="input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn primary" style="width:100%;justify-content:center;margin-top:4px" id="loginBtn">Entrar</button>
      <div class="login-err" id="loginErr"></div>
      <div class="login-hint">Acesso restrito a administradoras cadastradas.</div>
    </div>
  </div>
</div>
<div class="page hide" id="appPage">
  <div class="layout">
    <div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">Pacientes</span>
          <div style="display:flex;gap:6px">
            <button class="btn sm" id="newPatientBtn">+ Nova</button>
            <button class="btn sm ghost" id="refreshBtn">↻</button>
          </div>
        </div>
        <div class="card-body">
          <div class="search-wrap"><span class="search-icon">🔍</span><input class="input" id="searchInput" placeholder="Buscar paciente…"/></div>
          <div id="patientList" class="col" style="gap:4px"></div>
        </div>
      </div>
    </div>
    <div class="card" id="detailCard">
      <div class="card-head" style="padding-bottom:0">
        <span class="card-title" id="detailTitle" style="font-size:22px">Selecione uma paciente</span>
        <span class="badge" id="activePlanBadge" style="display:none"></span>
      </div>
      <div class="tabs-row">
        <button class="tab-btn active" data-tab="profile">Perfil</button>
        <button class="tab-btn" data-tab="plan">Plano</button>
        <button class="tab-btn" data-tab="diary">Diário</button>
        <button class="tab-btn" data-tab="photos">Fotos</button>
      </div>
      <div class="panel active" id="panel-profile">
        <div class="summary-grid" id="summaryGrid" style="display:none">
          <div class="summary-box"><div class="summary-num" id="sum-checklist">—</div><div class="summary-label">Checklist</div></div>
          <div class="summary-box"><div class="summary-num" id="sum-notes">—</div><div class="summary-label">Notas</div></div>
          <div class="summary-box"><div class="summary-num" id="sum-photos">—</div><div class="summary-label">Fotos</div></div>
          <div class="summary-box"><div class="summary-num" id="sum-plan">—</div><div class="summary-label">Plano</div></div>
        </div>
        <div class="col">
          <div class="row"><div><label class="lbl">Nome completo</label><input class="input" id="p_name" placeholder="Nome completo"/></div><div><label class="lbl">Email</label><input class="input" id="p_email" placeholder="email@exemplo.com"/></div></div>
          <div class="row"><div><label class="lbl">Telefone</label><input class="input" id="p_phone" placeholder="(00) 00000-0000"/></div><div><label class="lbl">Cidade</label><input class="input" id="p_city" placeholder="Cidade"/></div></div>
          <div class="row"><div><label class="lbl">Nascimento</label><input class="input" id="p_birth" placeholder="AAAA-MM-DD"/></div><div><label class="lbl">User ID</label><input class="input mono" id="p_userid" placeholder="uuid Supabase Auth"/></div></div>
          <div class="sep" style="margin:4px 0"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn primary" id="saveProfileBtn">Salvar perfil</button>
            <button class="btn danger" id="deactivatePlansBtn">Desativar planos</button>
          </div>
        </div>
      </div>
      <div class="panel" id="panel-plan">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
          <input class="input" id="planTitle" placeholder="Título do plano" style="flex:1"/>
          <span class="badge" id="planStatus">—</span>
        </div>
        <textarea class="input" id="planJson" placeholder='{ "etapas": [], "observações": "" }'></textarea>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="btn primary" id="savePlanBtn">Salvar plano</button>
          <button class="btn" id="prettyBtn">Formatar JSON</button>
        </div>
      </div>
      <div class="panel" id="panel-diary">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
          <span class="badge" id="diaryBadge">—</span>
          <button class="btn sm ghost" id="refreshDiaryBtn">↻ Atualizar</button>
        </div>
        <div class="diary-section"><h4>Checklist do Protocolo</h4><div class="scroll-x"><table id="checklistTable"><thead><tr><th>Item</th><th>Status</th><th>Data</th></tr></thead><tbody></tbody></table></div></div>
        <div class="sep"></div>
        <div class="diary-section"><h4>Notas da Paciente</h4><div class="scroll-x"><table id="notesTable"><thead><tr><th>ID</th><th>Conteúdo</th><th>Data</th></tr></thead><tbody></tbody></table></div></div>
      </div>
      <div class="panel" id="panel-photos">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
          <span class="badge" id="photosBadge">—</span>
          <button class="btn sm ghost" id="refreshPhotosBtn">↻ Atualizar</button>
        </div>
        <div class="photo-grid" id="photoGrid"></div>
        <div class="empty hide" id="photosEmpty"><div class="empty-icon">📷</div><div class="empty-text">Nenhuma foto enviada ainda</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const CONFIG={SUPABASE_URL:"https://ypqzfswpncqdklyzvxyg.supabase.co",SUPABASE_ANON:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwcXpmc3dwbmNxZGtseXp2eHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDAxMDMsImV4cCI6MjA4ODA3NjEwM30.kVdERqLi-e2t1XEHALfl05Pb7wSRuCKTAG7Vi-uG2kc",CRM_FN:"/.netlify/functions/crm"};
let sb=null,session=null,selected=null;
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function $$(id){return document.getElementById(id);}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function initials(n){return(n||'').trim().split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';}
function toast(msg,isErr=false){const el=$$('toast');el.textContent=msg;el.style.background=isErr?'var(--red)':'var(--ink)';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}
function setEnv(ok){const d=$$('envDot');d.textContent=ok?'online':'offline';d.className='env-dot '+(ok?'online':'offline');}
function initSb(){return window.supabase?.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON)||null;}
async function callCrm(op,body={}){if(!session?.access_token)throw new Error('Sem sessão');const res=await fetch(CONFIG.CRM_FN+'?op='+encodeURIComponent(op),{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+session.access_token},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data?.error||'Erro '+res.status);return data;}
async function updateAuth(){const u=session?.user;$$('whoami').textContent=u?.email||'';$$('logoutBtn').style.display=u?'inline-flex':'none';$$('loginPage').classList.toggle('hide',!!u);$$('appPage').classList.toggle('hide',!u);if(u){try{await callCrm('ping');setEnv(true);await loadPatients();}catch(e){setEnv(false);toast(e.message,true);}}}
$$('loginBtn').addEventListener('click',async()=>{const email=$$('loginEmail').value.trim();const pass=$$('loginPass').value;$$('loginErr').textContent='';if(!email||!pass)return toast('Preencha email e senha');const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error){$$('loginErr').textContent=error.message;return;}session=data.session;await updateAuth();});
$$('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')$$('loginBtn').click();});
$$('logoutBtn').addEventListener('click',async()=>{await sb.auth.signOut();session=null;selected=null;$$('patientList').innerHTML='';await updateAuth();});
async function loadPatients(){const q=$$('searchInput').value.trim();const data=await callCrm('patients_list',{q});const list=$$('patientList');list.innerHTML='';(data.patients||[]).forEach(p=>{const el=document.createElement('div');el.className='patient-item'+(selected?.user_id===p.user_id?' active':'');el.dataset.id=p.user_id;const cl_done=p.checklist_done??0;const cl_total=p.checklist_total??0;const notes=p.notes_count??0;const photos=p.photos_count??0;el.innerHTML='<div class="avatar">'+esc(initials(p.full_name))+'</div><div style="min-width:0;flex:1"><div class="p-name">'+esc(p.full_name||'—')+'</div><div class="p-sub">'+esc(p.email||p.user_id||'')+'</div><div class="p-stats">'+(cl_total?'<span class="stat-pill '+(cl_done>0?'has':'')+'">'+(cl_done)+'/'+cl_total+' ✓</span>':'')+(notes?'<span class="stat-pill has">'+notes+' 📝</span>':'')+(photos?'<span class="stat-pill has">'+photos+' 📷</span>':'')+(p.has_active_plan?'<span class="stat-pill has">plano ativo</span>':'')+'</div></div>';el.addEventListener('click',()=>selectPatient(p));list.appendChild(el);});if(!selected&&(data.patients||[]).length)selectPatient(data.patients[0]);}
$$('searchInput').addEventListener('input',debounce(()=>loadPatients().catch(e=>toast(e.message,true)),350));
$$('refreshBtn').addEventListener('click',()=>loadPatients().catch(e=>toast(e.message,true)));
$$('newPatientBtn').addEventListener('click',()=>{selected={user_id:'',full_name:'',email:'',phone:'',city:'',birth_date:''};document.querySelectorAll('.patient-item').forEach(el=>el.classList.remove('active'));$$('detailTitle').textContent='Nova Paciente';$$('activePlanBadge').style.display='none';$$('summaryGrid').style.display='none';['p_userid','p_name','p_email','p_phone','p_city','p_birth','planTitle','planJson'].forEach(id=>$$(id).value='');$$('planStatus').textContent='—';$$('planStatus').className='badge';$$('diaryBadge').textContent='—';$$('photosBadge').textContent='—';document.querySelector('#checklistTable tbody').innerHTML='';document.querySelector('#notesTable tbody').innerHTML='';$$('photoGrid').innerHTML='';switchTab('profile');});
function selectPatient(p){selected=p;document.querySelectorAll('.patient-item').forEach(el=>el.classList.toggle('active',el.dataset.id===p.user_id));$$('detailTitle').textContent=p.full_name||'—';if(p.checklist_total!=null){$$('summaryGrid').style.display='grid';$$('sum-checklist').textContent=(p.checklist_done??0)+'/'+(p.checklist_total??0);$$('sum-notes').textContent=p.notes_count??0;$$('sum-photos').textContent=p.photos_count??0;$$('sum-plan').textContent=p.has_active_plan?'✓':'—';}if(p.has_active_plan){$$('activePlanBadge').textContent=p.active_plan_title||'Plano ativo';$$('activePlanBadge').className='badge ok';$$('activePlanBadge').style.display='inline-flex';}else{$$('activePlanBadge').style.display='none';}$$('p_userid').value=p.user_id||'';$$('p_name').value=p.full_name||'';$$('p_email').value=p.email||'';$$('p_phone').value=p.phone||'';$$('p_city').value=p.city||'';$$('p_birth').value=p.birth_date||'';refreshPlan();refreshDiary();refreshPhotos();}
function switchTab(t){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$$('panel-'+t).classList.add('active');}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
$$('saveProfileBtn').addEventListener('click',async()=>{try{const payload={user_id:$$('p_userid').value.trim(),full_name:$$('p_name').value.trim(),email:$$('p_email').value.trim(),phone:$$('p_phone').value.trim(),city:$$('p_city').value.trim(),birth_date:$$('p_birth').value.trim()||null};if(!payload.user_id)return toast('Preencha o User ID');if(!payload.full_name)return toast('Preencha o nome');await callCrm('patient_upsert',payload);toast('Perfil salvo ✓');await loadPatients();}catch(e){toast(e.message,true);}});
$$('deactivatePlansBtn').addEventListener('click',async()=>{try{const id=$$('p_userid').value.trim();if(!id)return toast('Selecione uma paciente');await callCrm('plans_deactivate',{user_id:id});toast('Planos desativados');await refreshPlan();}catch(e){toast(e.message,true);}});
async function refreshPlan(){const id=$$('p_userid').value.trim();if(!id)return;const data=await callCrm('plan_get_active',{user_id:id});const plan=data.plan;const st=$$('planStatus');if(!plan){st.textContent='Sem plano ativo';st.className='badge';$$('planTitle').value='';$$('planJson').value='';return;}st.textContent=plan.is_active?'Ativo':'Inativo';st.className='badge '+(plan.is_active?'ok':'bad');$$('planTitle').value=plan.title||'Plano';$$('planJson').value=JSON.stringify(plan.content||{},null,2);}
$$('savePlanBtn').addEventListener('click',async()=>{try{const id=$$('p_userid').value.trim();if(!id)return toast('Selecione uma paciente');const title=$$('planTitle').value.trim()||'Plano';let content;try{content=JSON.parse($$('planJson').value.trim()||'{}');}catch{return toast('JSON inválido',true);}await callCrm('plan_save_active',{user_id:id,title,content});toast('Plano salvo ✓');await refreshPlan();await loadPatients();}catch(e){toast(e.message,true);}});
$$('prettyBtn').addEventListener('click',()=>{try{$$('planJson').value=JSON.stringify(JSON.parse($$('planJson').value.trim()||'{}'),null,2);}catch{toast('JSON inválido',true);}});
async function refreshDiary(){const id=$$('p_userid').value.trim();if(!id)return;const data=await callCrm('diary_get',{user_id:id});const cl=data.checklist||[],notes=data.notes||[];$$('diaryBadge').textContent=cl.length+' itens · '+notes.length+' notas';$$('diaryBadge').className='badge ok';const tb1=document.querySelector('#checklistTable tbody');tb1.innerHTML='';cl.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML='<td class="mono">'+esc(r.key)+'</td><td>'+(r.checked?'<span class="badge ok" style="padding:2px 8px">✓ feito</span>':'<span class="badge" style="padding:2px 8px">pendente</span>')+'</td><td class="mono" style="color:var(--muted2)">'+esc((r.updated_at||'').slice(0,10))+'</td>';tb1.appendChild(tr);});const tb2=document.querySelector('#notesTable tbody');tb2.innerHTML='';notes.forEach(r=>{const tr=document.createElement('tr');const short=(r.content||'').slice(0,200).replace(/\n/g,' ');tr.innerHTML='<td class="mono" style="color:var(--muted);white-space:nowrap">'+esc(r.note_id)+'</td><td>'+esc(short)+'</td><td class="mono" style="color:var(--muted2);white-space:nowrap">'+esc((r.updated_at||'').slice(0,10))+'</td>';tb2.appendChild(tr);});}
$$('refreshDiaryBtn').addEventListener('click',()=>refreshDiary().catch(e=>toast(e.message,true)));
async function refreshPhotos(){const id=$$('p_userid').value.trim();if(!id)return;const data=await callCrm('photos_get',{user_id:id});const photos=data.photos||[];$$('photosBadge').textContent=photos.length+' foto'+(photos.length!==1?'s':'');$$('photosBadge').className='badge'+(photos.length?'':' bad');const grid=$$('photoGrid');grid.innerHTML='';$$('photosEmpty').classList.toggle('hide',photos.length>0);photos.forEach(p=>{const div=document.createElement('div');div.className='photo-card';div.innerHTML='<a href="'+esc(p.public_url)+'" target="_blank" rel="noreferrer"><img src="'+esc(p.public_url)+'" alt="foto" loading="lazy"/></a><div class="ph-cap"><span class="mono">'+esc(p.photo_key||'')+'</span><span style="color:var(--muted2)">'+esc((p.updated_at||'').slice(0,10))+'</span></div>';grid.appendChild(div);});}
$$('refreshPhotosBtn').addEventListener('click',()=>refreshPhotos().catch(e=>toast(e.message,true)));
(async()=>{sb=initSb();setEnv(!!sb);if(!sb){$$('loginErr').textContent='Erro: configuração ausente.';return;}const{data}=await sb.auth.getSession();session=data?.session||null;sb.auth.onAuthStateChange((_,s)=>{session=s;updateAuth();});await updateAuth();})();
</script>
